<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖境塔羅 | Celestial Tarot - 探索靈魂的指引</title>
    <meta name="description" content="聖境塔羅提供美觀、直觀的塔羅牌抽取體驗，幫助您在星辰與靈魂的交織中尋找答案。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- MediaPipe Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars-container"></div>
    
    <header>
        <h1 class="glow-text">聖境塔羅</h1>
        <p class="subtitle">讓星辰指引您的道路</p>
    </header>

    <main>
        <!-- 隱藏的攝影機 -->
        <video id="videoElement" autoplay playsinline style="display: none;"></video>

        <!-- 手勢狀態提示 -->
        <div id="gesture-instruction" class="instruction-text hidden">
            <p>【張開手掌】旋轉卡牌｜【握拳】停留｜【食指往上滑】確認選牌</p>
        </div>

        <section id="tarot-board" class="board-container">
            <!-- 3D 環形場景 -->
            <div id="carousel-scene" class="carousel-scene hidden">
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p>正在洗牌...</p>
                </div>
                <div id="carousel" class="carousel">
                    <!-- 塔羅牌將由 JS 動態生成於此 -->
                </div>
            </div>
        </section>

        <!-- 已選取的 3 張卡牌 -->
        <section id="selected-cards-container" class="hidden">
            <h3 class="subtitle">您的星辰指引</h3>
            <div id="selected-cards" class="selected-cards">
                <div class="slot" id="slot-1">1</div>
                <div class="slot" id="slot-2">2</div>
                <div class="slot" id="slot-3">3</div>
            </div>
        </section>

        <section id="control-panel">
            <button id="start-gesture-btn" class="premium-btn active">開啟手勢抽牌</button>
            <button id="draw-btn" class="premium-btn hidden">單張抽牌</button>
        </section>

        <section id="reading-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="card-display"></div>
                <div id="card-meaning">
                    <h2 id="card-title"></h2>
                    <p id="card-desc"></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 聖境塔羅 Celestial Tarot. All rights reserved.</p>
    </footer>

    <script src="tarot_dict.js"></script>
    <script src="app.js"></script>
</body>
</html>
